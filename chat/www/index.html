<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<title>viddeoxx chat</title>
<!-- chat.css is fully self-contained — no main.css needed -->
<link rel="stylesheet" href="/chat/chat.css">
<link rel="icon" href="/assets/img/favicon.svg">
<link rel="stylesheet" href="/slayer/slayer.css">
</head>
<body class="chat-body">

<!-- ══ TOP AD SLOT ══ -->
<div id="chat-ad-top" class="chat-ad-banner" aria-hidden="true"></div>

<!-- ══ APP SHELL ══ -->
<div id="chat-app" class="chat-shell" style="display:none">

  <!-- LEFT: Server/Room sidebar -->
  <aside id="chat-sidebar" class="chat-sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">💬</span>
      <span class="sidebar-title">viddeoxx chat</span>
      <button id="btn-new-room" class="btn-icon" title="New room">＋</button>
    </div>

    <div class="sidebar-section-label">ROOMS</div>
    <ul id="room-list" class="room-list"></ul>

    <!-- AD SLOT: sidebar bottom -->
    <div id="chat-ad-sidebar" class="chat-ad-sidebar" aria-hidden="true"></div>

    <div class="sidebar-footer">
      <div id="user-badge" class="user-badge">
        <span id="user-dot" class="user-dot"></span>
        <span id="user-name-display">Anonymous</span>
        <button id="btn-rename" class="btn-tiny" title="Change name">✏️</button>
      </div>
      <a href="/" class="sidebar-home-link">← main site</a>
    </div>
  </aside>

  <!-- MAIN: Chat area -->
  <main class="chat-main">
    <!-- Channel header -->
    <header class="chat-header">
      <button id="btn-sidebar-toggle" class="btn-icon btn-mobile-only">☰</button>
      <span id="room-icon" class="room-icon-lg">💬</span>
      <div class="room-header-info">
        <span id="room-name-header" class="room-name-h">Select a room</span>
        <span id="room-desc-header" class="room-desc-h"></span>
      </div>
      <div class="header-meta">
        <span id="online-count" class="online-badge">0 online</span>
        <!-- AD SLOT: inline header right -->
        <div id="chat-ad-header" class="chat-ad-inline" aria-hidden="true"></div>
      </div>
    </header>

    <!-- Message feed -->
    <div id="msg-feed" class="msg-feed">
      <div id="load-more-wrap" class="load-more-wrap" style="display:none">
        <button id="btn-load-more" class="btn-load-more">Load older messages</button>
      </div>
      <div id="msg-list" class="msg-list"></div>
      <div id="typing-indicator" class="typing-indicator" style="display:none">
        <span id="typing-text"></span><span class="typing-dots"><span></span><span></span><span></span></span>
      </div>
    </div>

    <!-- AD SLOT: above input (sticky) -->
    <div id="chat-ad-above-input" class="chat-ad-above-input" aria-hidden="true"></div>

    <!-- Input bar -->
    <footer class="chat-input-bar" id="chat-input-bar" style="display:none">
      <div id="reply-preview" class="reply-preview" style="display:none">
        <span id="reply-text"></span>
        <button id="btn-cancel-reply" class="btn-tiny">✕</button>
      </div>
      <div class="input-row">
        <textarea id="msg-input"
          class="msg-textarea"
          placeholder="Message #general… (anonymous)"
          maxlength="2000"
          rows="1"></textarea>
        <button id="btn-send" class="btn-send">➤</button>
      </div>
      <div class="input-meta">
        <span id="char-count" class="char-count">0/2000</span>
        <span class="anon-badge">👤 anonymous</span>
      </div>
    </footer>
  </main>
</div>

<!-- ══ ONBOARDING MODAL ══ -->
<div id="modal-onboard" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-logo">💬</div>
    <h2>Join the chat</h2>
    <p class="modal-sub">No account. No email. Just a name.</p>

    <label class="field-label">Your display name</label>
    <input id="input-display-name"
      class="field-input"
      type="text"
      placeholder="e.g. ghost_user_42"
      maxlength="32"
      autocomplete="off">

    <label class="field-label">Pick a color</label>
    <div class="color-picker" id="color-picker">
      <button class="color-btn active" data-color="#a855f7" style="background:#a855f7"></button>
      <button class="color-btn" data-color="#06b6d4" style="background:#06b6d4"></button>
      <button class="color-btn" data-color="#10b981" style="background:#10b981"></button>
      <button class="color-btn" data-color="#f59e0b" style="background:#f59e0b"></button>
      <button class="color-btn" data-color="#ef4444" style="background:#ef4444"></button>
      <button class="color-btn" data-color="#ec4899" style="background:#ec4899"></button>
      <button class="color-btn" data-color="#8b5cf6" style="background:#8b5cf6"></button>
      <button class="color-btn" data-color="#64748b" style="background:#64748b"></button>
    </div>

    <button id="btn-enter-chat" class="btn-primary btn-full">Enter chat →</button>
    <p class="modal-privacy">
      🔒 100% anonymous · No logs · Messages auto-delete in 7 days
      · <a href="/privacy.html">Privacy policy</a>
    </p>
  </div>
</div>

<!-- ══ NEW ROOM MODAL ══ -->
<div id="modal-new-room" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h2>Create a room</h2>
    <label class="field-label">Room name</label>
    <input id="input-room-name" class="field-input" type="text" placeholder="e.g. gaming" maxlength="32">
    <label class="field-label">Description (optional)</label>
    <input id="input-room-desc" class="field-input" type="text" placeholder="What's this room for?" maxlength="200">
    <label class="field-label">Icon emoji</label>
    <div class="icon-picker" id="icon-picker">
      <span class="icon-opt active">💬</span><span class="icon-opt">🎮</span>
      <span class="icon-opt">🎵</span><span class="icon-opt">🎨</span>
      <span class="icon-opt">📰</span><span class="icon-opt">🔥</span>
      <span class="icon-opt">👾</span><span class="icon-opt">🌍</span>
    </div>
    <div class="modal-actions">
      <button id="btn-cancel-room" class="btn-secondary">Cancel</button>
      <button id="btn-create-room" class="btn-primary">Create room</button>
    </div>
  </div>
</div>

<!-- ══ POPUP AD SLOT ══ -->
<div id="chat-ad-popup" class="chat-ad-popup" aria-hidden="true" style="display:none"></div>

<script src="/chat/chat.js"></script>
<script src="/slayer/slayer.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="728" height="90" viewBox="0 0 728 90">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="728" height="90" fill="url(#bg)"/>
  <rect width="728" height="2" y="88" fill="url(#accent)" opacity="0.6"/>
  <!-- Logo/brand area -->
  <rect x="20" y="20" width="50" height="50" rx="10" fill="url(#accent)" opacity="0.15"/>
  <text x="45" y="52" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="url(#accent)" text-anchor="middle" filter="url(#glow)">vx</text>
  <!-- Main copy -->
  <text x="90" y="38" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="700" fill="#e8e8f0">Your Ad Here — Premium Placement</text>
  <text x="90" y="62" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" fill="#9ca3af">Reach thousands of visitors. Edit in slayer/ads.json</text>
  <!-- CTA button -->
  <rect x="590" y="22" width="118" height="46" rx="8" fill="url(#accent)"/>
  <rect x="590" y="22" width="118" height="46" rx="8" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <text x="649" y="50" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Learn More →</text>
  <!-- Decorative dots -->
  <circle cx="540" cy="45" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="555" cy="35" r="2" fill="#a855f7" opacity="0.4"/>
  <circle cx="570" cy="55" r="2" fill="#7c3aed" opacity="0.3"/>
</svg>

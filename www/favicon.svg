<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12101f"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle inner glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.4"/>
  <!-- Letter "I" — bold, centered -->
  <!-- Top bar -->
  <rect x="18" y="13" width="28" height="7" rx="3.5" fill="url(#g)"/>
  <!-- Stem -->
  <rect x="28.5" y="20" width="7" height="24" rx="3" fill="url(#g)"/>
  <!-- Bottom bar -->
  <rect x="18" y="44" width="28" height="7" rx="3.5" fill="url(#g)"/>
</svg>
